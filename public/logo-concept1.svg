<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept 1: "Precision W"
  Bold geometric W with flat, miter-joined strokes — ink outer, terra inner V.
  Paired with WYLOKS in tracked uppercase sans-serif.
  Radiates: modern, confident, precise.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" role="img" aria-label="Wyloks">
  <title>Wyloks</title>
  <defs>
    <style>
      .wm { font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
            font-size: 17px; font-weight: 700; letter-spacing: 5px;
            fill: #16120b; }
      .wm-tag { font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
                font-size: 7px; font-weight: 500; letter-spacing: 3.5px;
                fill: #7a6e60; }
    </style>
  </defs>

  <!-- W mark: outer arms in ink, inner V in terra -->
  <!-- stroke-linecap="butt" + stroke-linejoin="miter" = sharp precision joins -->
  <path d="M5 6 L15 44 L22 22 L29 44 L39 6"
        fill="none" stroke="#16120b" stroke-width="5"
        stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10"/>
  <path d="M15 44 L22 22 L29 44"
        fill="none" stroke="#c9622f" stroke-width="5"
        stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10"/>

  <!-- Thin vertical separator -->
  <line x1="56" y1="10" x2="56" y2="42"
        stroke="#16120b" stroke-width="0.75" opacity="0.2"/>

  <!-- Wordmark: WYLOKS tracked uppercase -->
  <text x="68" y="32" class="wm">WYLOKS</text>

  <!-- Sub-label: IT &amp; DIGITAL GROWTH -->
  <text x="69" y="43" class="wm-tag">IT &amp; DIGITAL GROWTH</text>
</svg>
