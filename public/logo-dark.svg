<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 52" role="img" aria-label="Wyloks">
  <title>Wyloks</title>
  <!-- Ascending bar mark: cream / terra / cream -->
  <rect x="2"  y="30" width="10" height="16" fill="#f5f1ea"/>
  <rect x="17" y="16" width="10" height="30" fill="#c9622f"/>
  <rect x="32" y="4"  width="10" height="42" fill="#f5f1ea"/>
  <!-- Thin separator -->
  <line x1="56" y1="10" x2="56" y2="42"
        stroke="#f5f1ea" stroke-width="0.75" opacity="0.35"/>
  <!-- Wordmark -->
  <text x="66" y="33"
        font-family="'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="22"
        fill="#f5f1ea"
        letter-spacing="0.01em">Wyloks<tspan fill="#c9622f" dx="1">.</tspan></text>
</svg>
