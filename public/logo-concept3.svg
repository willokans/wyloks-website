<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept 3: "Ascent"
  Three ascending vertical bars — references growth, signal strength, data.
  Left and right bars in ink; centre bar in terracotta as focal accent.
  Paired with WYLOKS in bold tracked sans.
  Radiates: growth, technology, forward motion.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52" role="img" aria-label="Wyloks">
  <title>Wyloks</title>
  <!-- Ascending bar chart mark -->
  <!-- Bar 1: short, ink -->
  <rect x="2"  y="30" width="10" height="16" fill="#16120b"/>
  <!-- Bar 2: medium, terracotta (centre accent) -->
  <rect x="17" y="16" width="10" height="30" fill="#c9622f"/>
  <!-- Bar 3: tall, ink -->
  <rect x="32" y="4"  width="10" height="42" fill="#16120b"/>

  <!-- Thin separator -->
  <line x1="56" y1="10" x2="56" y2="42"
        stroke="#16120b" stroke-width="0.75" opacity="0.2"/>

  <!-- Wordmark: Cormorant Garamond italic -->
  <text x="66" y="31"
        font-family="'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="17"
        fill="#16120b"
        letter-spacing="0.01em">Wyloks<tspan fill="#c9622f" dx="1">.</tspan></text>
  <!-- Sub-label -->
  <text x="67" y="42"
        font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
        font-size="7"
        font-weight="500"
        letter-spacing="3.5"
        fill="#7a6e60">IT &amp; DIGITAL GROWTH</text>
</svg>
